<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FrankyEnglish</title>
<link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

<style>
:root {
  --primary: #1E3A8A;
  --accent: #3B82F6;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #0F172A;
  --text-light: #64748B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #A7F3D0, #93C5FD);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.login-shell {
  display: flex;
  width: 900px;
  max-width: 95%;
  border-radius: 16px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.left-panel {
  width: 50%;
  background: linear-gradient(135deg, #1E3A8A, #0F172A);
  color: white;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.right-panel {
  flex: 1;
  padding: 40px;
}

.form-title {
  font-size: 22px;
  margin-bottom: 5px;
}

.form-subtitle {
  color: var(--text-light);
  margin-bottom: 20px;
}

.form-input {
  width: 100%;
  height: 42px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 0 12px;
}

.btn-login {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3B82F6, #1E3A8A);
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.btn-google {
  width: 100%;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  margin-top: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="login-shell">

  <div class="left-panel">
    <h2>FankyEnglish</h2>
    <p>Tu portal de aprendizaje</p>
  </div>

  <div class="right-panel">
    <div class="form-title">Bienvenido</div>
    <div class="form-subtitle">Inicia sesión</div>

    <input id="email" class="form-input" type="email" placeholder="Correo">
    <input id="password" class="form-input" type="password" placeholder="Contraseña">

    <button class="btn-login" onclick="login()">Entrar</button>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.6l6.9-6.9C35.64 2.34 30.2 0 24 0 14.62 0 6.27 5.38 2.24 13.22l8.04 6.24C12.2 13.1 17.6 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.7-.15-3.33-.44-4.91H24v9.3h12.7c-.55 2.96-2.2 5.47-4.7 7.14l7.3 5.66C43.9 37.1 46.5 31.4 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.28 28.46a14.5 14.5 0 010-8.92l-8.04-6.24A23.98 23.98 0 000 24c0 3.77.9 7.34 2.24 10.7l8.04-6.24z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.92-2.14 15.9-5.8l-7.3-5.66c-2.02 1.36-4.6 2.16-8.6 2.16-6.4 0-11.8-3.6-13.72-8.96l-8.04 6.24C6.27 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBYnI8vDNGkzCxEwAX93HbbxeC7Nq0UkW0",
  authDomain: "portal-de-ingles.firebaseapp.com",
  projectId: "portal-de-ingles",
  storageBucket: "portal-de-ingles.firebasestorage.app",
  messagingSenderId: "555874735361",
  appId: "1:555874735361:web:2dc6e4b51a9b5c5548f700",
  measurementId: "G-488275BW4C"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => window.location.href = "dashboard.html")
    .catch(err => alert(err.message));
}

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(() => window.location.href = "dashboard.html")
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
