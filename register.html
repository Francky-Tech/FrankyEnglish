<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - FrankyEnglish</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />

<style>
:root {
  --primary:    #1E3A8A;
  --accent:     #3B82F6;
  --border:     #E5E7EB;
  --text:       #0F172A;
  --text-light: #64748B;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: linear-gradient(135deg, #A7F3D0, #93C5FD);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

/* ── CONTENEDOR ── */
.login-shell {
  display: flex;
  width: 900px;
  max-width: 100%;
  border-radius: 16px;
  overflow: hidden;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* ── PANEL IZQUIERDO ── */
.left-panel {
  width: 45%;
  background: linear-gradient(135deg, #1E3A8A, #0F172A);
  color: white;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 12px;
}

.left-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.left-logo-icon {
  width: 36px; height: 36px;
  background: #3B82F6;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.left-nombre {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  color: #fff;
  letter-spacing: -0.3px;
}

.left-tagline {
  font-size: 14px;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
  max-width: 260px;
}

/* Pasos del registro */
.left-pasos {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}

.paso-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}

.paso-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(59,130,246,0.25);
  border: 1px solid rgba(59,130,246,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: #93C5FD;
  flex-shrink: 0;
}

/* ── PANEL DERECHO ── */
.right-panel {
  flex: 1;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.form-title    { font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.form-subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 24px; }

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 5px;
}

.form-input {
  width: 100%;
  height: 42px;
  margin-bottom: 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 0 12px;
  font-size: 14px;
  font-family: 'DM Sans', system-ui, sans-serif;
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
  outline: none;
}

.form-input:focus {
  border-color: #3B82F6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

/* Mensaje de error */
#error-msg {
  display: none;
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #B91C1C;
  margin-bottom: 12px;
}

.btn-register {
  width: 100%;
  height: 44px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3B82F6, #1E3A8A);
  color: white;
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', system-ui, sans-serif;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.15s;
}

.btn-register:hover { opacity: 0.9; }

.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0;
}

.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; color: var(--text-light); }

.btn-google {
  width: 100%;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: 'DM Sans', system-ui, sans-serif;
  color: var(--text);
  transition: background 0.15s;
}

.btn-google:hover { background: #F8FAFC; }

.login-link {
  text-align: center;
  margin-top: 18px;
  font-size: 13px;
  color: var(--text-light);
}

.login-link a { color: #3B82F6; font-weight: 500; text-decoration: none; }
.login-link a:hover { text-decoration: underline; }

/* ══════════════════════════════
   RESPONSIVE — MÓVIL
══════════════════════════════ */
@media (max-width: 640px) {

  body { padding: 0; align-items: flex-start; }

  .login-shell {
    flex-direction: column;
    width: 100%;
    min-height: 100vh;
    border-radius: 0;
    box-shadow: none;
  }

  /* Panel izquierdo: barra compacta arriba */
  .left-panel {
    width: 100%;
    padding: 20px;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .left-logo    { margin-bottom: 0; }
  .left-tagline { display: none; }
  .left-pasos   { display: none; }

  /* Panel derecho: formulario completo */
  .right-panel {
    flex: 1;
    padding: 28px 20px 40px;
    justify-content: flex-start;
  }
}
</style>
</head>

<body>

<div class="login-shell">

  <!-- PANEL IZQUIERDO -->
  <div class="left-panel">
    <div class="left-logo">
      <div class="left-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="18" height="14" rx="2" fill="#B22234"/>
          <path d="M3 7h18M3 9h18M3 11h18M3 13h18M3 15h18M3 17h18" stroke="white" stroke-width="1"/>
          <rect x="3" y="5" width="8" height="6" fill="#3C3B6E"/>
        </svg>
      </div>
      <div class="left-nombre">FrankyEnglish</div>
    </div>
    <p class="left-tagline">Empieza tu camino en inglés hoy. Regístrate gratis y accede a tus primeras clases en minutos.</p>
    <div class="left-pasos">
      <div class="paso-item">
        <div class="paso-num">1</div>
        Crea tu cuenta gratis
      </div>
      <div class="paso-item">
        <div class="paso-num">2</div>
        Elige tu nivel (A1 → B2)
      </div>
      <div class="paso-item">
        <div class="paso-num">3</div>
        Accede a tus clases
      </div>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="right-panel">
    <div class="form-title">Crear cuenta</div>
    <div class="form-subtitle">Es gratis, sin tarjeta de crédito</div>

    <div id="error-msg"></div>

    <label class="form-label" for="email">Correo electrónico</label>
    <input id="email" class="form-input" type="email" placeholder="tu@correo.com" />

    <label class="form-label" for="password">Contraseña</label>
    <input id="password" class="form-input" type="password" placeholder="Mínimo 6 caracteres" />

    <button class="btn-register" onclick="register()">Crear mi cuenta</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">o también</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-google" onclick="googleRegister()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.6l6.9-6.9C35.64 2.34 30.2 0 24 0 14.62 0 6.27 5.38 2.24 13.22l8.04 6.24C12.2 13.1 17.6 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.7-.15-3.33-.44-4.91H24v9.3h12.7c-.55 2.96-2.2 5.47-4.7 7.14l7.3 5.66C43.9 37.1 46.5 31.4 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.28 28.46a14.5 14.5 0 010-8.92l-8.04-6.24A23.98 23.98 0 000 24c0 3.77.9 7.34 2.24 10.7l8.04-6.24z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.92-2.14 15.9-5.8l-7.3-5.66c-2.02 1.36-4.6 2.16-8.6 2.16-6.4 0-11.8-3.6-13.72-8.96l-8.04 6.24C6.27 42.62 14.62 48 24 48z"/>
      </svg>
      Registrarse con Google
    </button>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyBYnI8vDNGkzCxEwAX93HbbxeC7Nq0UkW0",
  authDomain:        "portal-de-ingles.firebaseapp.com",
  projectId:         "portal-de-ingles",
  storageBucket:     "portal-de-ingles.firebasestorage.app",
  messagingSenderId: "555874735361",
  appId:             "1:555874735361:web:2dc6e4b51a9b5c5548f700",
  measurementId:     "G-488275BW4C"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

function mostrarError(msg) {
  var el = document.getElementById("error-msg");
  el.textContent = msg;
  el.style.display = "block";
}

// Crear perfil inicial en Firestore al registrarse
async function crearPerfil(usuario) {
  var ref  = db.collection("estudiantes").doc(usuario.uid);
  var snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      nombre:              usuario.displayName || usuario.email.split("@")[0],
      email:               usuario.email,
      nivel:               "A1",
      nivelNombre:         "Principiante",
      nivelSiguiente:      "A2",
      progreso:            0,
      unidadesCompletadas: 0,
      unidadesTotal:       10,
      horasEstudio:        0,
      racha:               0,
      tareasPendientes:    0,
      creadoEn:            firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}

/* REGISTRO EMAIL */
function register() {
  var email    = document.getElementById("email").value.trim();
  var password = document.getElementById("password").value;

  if (!email || !password) {
    mostrarError("Por favor completa todos los campos.");
    return;
  }

  if (password.length < 6) {
    mostrarError("La contraseña debe tener al menos 6 caracteres.");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(function(result) {
      return crearPerfil(result.user);
    })
    .then(function() {
      window.location.href = "dashboard.html";
    })
    .catch(function(err) {
      var mensajes = {
        "auth/email-already-in-use": "Este correo ya tiene una cuenta. ¿Quieres iniciar sesión?",
        "auth/invalid-email":        "El correo no es válido.",
        "auth/weak-password":        "La contraseña es muy débil. Usa al menos 6 caracteres."
      };
      mostrarError(mensajes[err.code] || err.message);
    });
}

/* REGISTRO GOOGLE */
function googleRegister() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .then(function(result) {
      return crearPerfil(result.user);
    })
    .then(function() {
      window.location.href = "dashboard.html";
    })
    .catch(function(err) {
      mostrarError(err.message);
    });
}
</script>

</body>
</html>
